<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Stag Times</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>The Stag Times</h1>
        <p>from <span style="color:blue;">WAT</span></p>

        <ul>
            <li class="current" data-pdf="PDFS/2026-june.pdf">Vol. 3 - June '26</li>
            <li data-pdf="PDFS/2026-may.pdf">Vol. 2 - May '26</li>
            <li data-pdf="PDFS/2026-april.pdf">Vol. 1 - April '26</li>
        </ul>
    </header>

    <main>
        <div class="pdf-container">
            <iframe
                id="pdf-viewer"
                src="PDFS/2026-july.pdf#view=fitH"
                title="The Stag Times PDF viewer">
            </iframe>
        </div>
    </main>

    <script>
        const pdfViewer = document.getElementById("pdf-viewer");
        const pdfLinks = document.querySelectorAll("header ul li");

        pdfLinks.forEach((item) => {
            item.addEventListener("click", () => {
                pdfLinks.forEach((link) => link.classList.remove("current"));
                item.classList.add("current");

                const pdfFile = item.dataset.pdf;
                pdfViewer.src = pdfFile + "#view=fitH";
            });
        });
    </script>
</body>
</html>
