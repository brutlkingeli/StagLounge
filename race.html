<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Stags Scum Leaderboard.">
    <title>Scum Leaderboard</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="race.css">
    <script src="race.js" defer></script>
</head>

<body>
    <main class="race-page">
        <h1>Biggest Scum</h1>

        <a class="return-link" href="index.html">Return to The Stag Times</a>

        <section class="leaderboard" aria-label="Scum Race">
            <!--
                Set each --score percentage to change a bar's length.
                Replace the files in images/race/ with photos of the nine stags.
            -->
            <div class="race-entry" style="--score: 14%">
                <div class="stat-bar" aria-label="Aidan's scum level"></div>
                <div class="portrait-placeholder" aria-hidden="true">1</div>
                <img class="portrait" src="images/race/aidan.png" alt="Aidan">
            </div>
            <div class="race-entry" style="--score: 27%">
                <div class="stat-bar" aria-label="Ashwin's scum level"></div>
                <div class="portrait-placeholder" aria-hidden="true">2</div>
                <img class="portrait" src="images/race/ashwin.png" alt="Ashwin">
            </div>
            <div class="race-entry" style="--score: 61%">
                <div class="stat-bar" aria-label="Auggie's scum level"></div>
                <div class="portrait-placeholder" aria-hidden="true">3</div>
                <img class="portrait" src="images/race/auggie.png" alt="Auggie">
            </div>
            <div class="race-entry" style="--score: 3%">
                <div class="stat-bar" aria-label="Cristian's scum level"></div>
                <div class="portrait-placeholder" aria-hidden="true">4</div>
                <img class="portrait" src="images/race/cristian.png" alt="Cristian">
            </div>
            <div class="race-entry" style="--score: 30%">
                <div class="stat-bar" aria-label="Eli's scum level"></div>
                <div class="portrait-placeholder" aria-hidden="true">5</div>
                <img class="portrait" src="images/race/eli.png" alt="Eli">
            </div>
            <div class="race-entry" style="--score: 65%">
                <div class="stat-bar" aria-label="Gavin's scum level"></div>
                <div class="portrait-placeholder" aria-hidden="true">6</div>
                <img class="portrait" src="images/race/gavin.png" alt="Gavin">
            </div>
            <div class="race-entry" style="--score: 39%">
                <div class="stat-bar" aria-label="Harry's scum level"></div>
                <div class="portrait-placeholder" aria-hidden="true">7</div>
                <img class="portrait" src="images/race/harry.png" alt="Harry">
            </div>
            <div class="race-entry" style="--score: 24%">
                <div class="stat-bar" aria-label="Len's scum level"></div>
                <div class="portrait-placeholder" aria-hidden="true">8</div>
                <img class="portrait" src="images/race/len.png" alt="Len">
            </div>
            <div class="race-entry" style="--score: 88%">
                <div class="stat-bar" aria-label="William's scum level"></div>
                <div class="portrait-placeholder" aria-hidden="true">9</div>
                <img class="portrait" src="images/race/william.png" alt="William">
            </div>
        </section>
    </main>
</body>
</html>
